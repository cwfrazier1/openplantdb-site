# CT 200 (nginx proxy). TLS lines added by certbot after first issue:
#   certbot --nginx -d whatcaniplantnow.com -d www.whatcaniplantnow.com --redirect
# The app also answers on plants.fairbrook.org via an identical vhost.
server {
    server_name whatcaniplantnow.com www.whatcaniplantnow.com;
    client_max_body_size 10M;
    location / {
        proxy_pass http://192.168.1.68:8000;   # CT 226
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1h;
    }
    listen 80;
}
